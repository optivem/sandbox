name: auto-on-created

on:
  issues:
    types: [opened]

concurrency:
  group: process-issue
  cancel-in-progress: false

jobs:
  process-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate creator and find project
        id: validate
        uses: ./.github/actions/validate-issue
        with:
          username: ${{ github.event.issue.user.login }}
          body: ${{ github.event.issue.body }}

      - name: Close unauthorized issue
        if: steps.validate.outputs.is-valid == 'false'
        uses: ./.github/actions/close-issue
        with:
          issue-number: ${{ github.event.issue.number }}
          title: "INVALID | ${{ github.event.issue.title }}"
          body: "> [!CAUTION]\n> ## ❌ Issue Rejected\n> Hi @${{ github.event.issue.user.login }}, you are not a member of the selected project.\n>\n> If you believe this is an error, please contact [Valentina Jemuović](https://github.com/valentinajemuovic).\n>\n> **This issue has been closed automatically.**"

      - name: Check for duplicate issue
        id: duplicate
        if: steps.validate.outputs.is-valid == 'true'
        uses: ./.github/actions/check-duplicate
        with:
          issue-number: ${{ github.event.issue.number }}
          project-key: ${{ steps.validate.outputs.project-key }}
          bootcamp-id: ${{ steps.validate.outputs.bootcamp-id }}
          module-num: ${{ steps.validate.outputs.module-num }}
          task-num: ${{ steps.validate.outputs.task-num }}

      - name: Close duplicate issue
        if: steps.validate.outputs.is-valid == 'true' && steps.duplicate.outputs.is-duplicate == 'true'
        uses: ./.github/actions/close-issue
        with:
          issue-number: ${{ github.event.issue.number }}
          title: "DUPLICATE | ${{ github.event.issue.title }}"
          body: "Duplicate of #${{ steps.duplicate.outputs.original-number }}\n\n> [!CAUTION]\n> ## ❌ Duplicate Issue\n> A ticket for this project and module already exists: #${{ steps.duplicate.outputs.original-number }}\n>\n> **This issue has been closed automatically as a duplicate.**"
          state-reason: "duplicate"

      - name: Check module prerequisites
        id: prereqs
        if: steps.validate.outputs.is-valid == 'true' && steps.duplicate.outputs.is-duplicate != 'true'
        uses: ./.github/actions/check-prerequisites
        with:
          project-key: ${{ steps.validate.outputs.project-key }}
          bootcamp-id: ${{ steps.validate.outputs.bootcamp-id }}
          module-num: ${{ steps.validate.outputs.module-num }}
          github-token: ${{ secrets.PROJECT_TOKEN }}

      - name: Close issue if prerequisites not met
        if: steps.validate.outputs.is-valid == 'true' && steps.duplicate.outputs.is-duplicate != 'true' && steps.prereqs.outputs.allowed == 'false'
        uses: ./.github/actions/close-issue
        with:
          issue-number: ${{ github.event.issue.number }}
          title: "BLOCKED | ${{ github.event.issue.title }}"
          body: "> [!CAUTION]\n> ## ❌ Prerequisites Not Met\n> You must complete all tasks in the previous module before starting this one.\n>\n> **Incomplete tasks:** ${{ steps.prereqs.outputs.missing-tasks }}\n>\n> Please complete those tasks first, then re-create this ticket.\n>\n> **This issue has been closed automatically.**"

      - name: Add to project board
        if: steps.validate.outputs.is-valid == 'true' && steps.duplicate.outputs.is-duplicate != 'true' && steps.prereqs.outputs.allowed != 'false'
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ steps.validate.outputs.project-url }}
          github-token: ${{ secrets.PROJECT_TOKEN }}

      - name: Set status to In Review
        if: steps.validate.outputs.is-valid == 'true' && steps.duplicate.outputs.is-duplicate != 'true' && steps.prereqs.outputs.allowed != 'false'
        uses: ./.github/actions/set-project-status
        with:
          issue-node-id: ${{ github.event.issue.node_id }}
          status: In Review
          github-token: ${{ secrets.PROJECT_TOKEN }}

      # TODO: Re-enable assignee assignment
      # - name: Assign team members
      #   if: steps.validate.outputs.is-valid == 'true' && steps.duplicate.outputs.is-duplicate != 'true'
      #   uses: ./.github/actions/assign-issue
      #   with:
      #     issue-number: ${{ github.event.issue.number }}
      #     assignees: ${{ steps.validate.outputs.assignees }}

      - name: Update title and description
        if: steps.validate.outputs.is-valid == 'true' && steps.duplicate.outputs.is-duplicate != 'true' && steps.prereqs.outputs.allowed != 'false'
        uses: ./.github/actions/update-issue
        with:
          issue-number: ${{ github.event.issue.number }}
          project-key: ${{ steps.validate.outputs.project-key }}
          project-name: ${{ steps.validate.outputs.project-name }}
          repo-url: ${{ steps.validate.outputs.repo-url }}
          bootcamp-id: ${{ steps.validate.outputs.bootcamp-id }}
          module: ${{ steps.validate.outputs.module }}
          task: ${{ steps.validate.outputs.task }}

      - name: Add project, bootcamp, module, and task labels
        if: steps.validate.outputs.is-valid == 'true' && steps.duplicate.outputs.is-duplicate != 'true' && steps.prereqs.outputs.allowed != 'false'
        uses: ./.github/actions/add-labels
        with:
          issue-number: ${{ github.event.issue.number }}
          labels: "project-${{ steps.validate.outputs.project-key }}, bootcamp-${{ steps.validate.outputs.bootcamp-id }}, module-${{ steps.validate.outputs.module-num }}, task-${{ steps.validate.outputs.task-num }}"

      - name: Set issue type to Task
        if: steps.validate.outputs.is-valid == 'true' && steps.duplicate.outputs.is-duplicate != 'true' && steps.prereqs.outputs.allowed != 'false'
        uses: ./.github/actions/set-issue-type
        with:
          issue-node-id: ${{ github.event.issue.node_id }}
          type: Task
