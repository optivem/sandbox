name: auto-on-deleted

on:
  issues:
    types: [deleted]

jobs:
  log-deletion:
    runs-on: ubuntu-latest
    steps:
      - name: Log deleted issue
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          SENDER: ${{ github.event.sender.login }}
        run: echo "Issue #$ISSUE_NUMBER ($ISSUE_TITLE) deleted by @$SENDER. Dashboard will refresh via workflow_run."
