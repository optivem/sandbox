name: dashboard

on:
  workflow_run:
    workflows:
      - auto-on-created
      - auto-on-closed
      - auto-on-comment
      - auto-on-edited
      - auto-on-reopened
    types: [completed]
  push:
    branches: [main]
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize runs but do NOT cancel in-flight ones: bursts of ticket events
# must each complete their deploy so Pages converges to the latest state.
# Runs are cheap (~20s), so queueing is preferable to mid-flight cancellation.
concurrency:
  group: dashboard
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Generate dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: node scripts/generate-dashboard.mjs

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
