name: "ATDD Sandbox Review"
description: "Submit your ATDD sandbox project for review"
body:
  - type: dropdown
    id: project
    attributes:
      label: Project
      description: Select your project.
      options:
        - "— Select a project —"
        - BDOK — Budget OK
        - CCRS — Car Charging Reservation System
        - CTF — CTF
        - ESLA — Event Sourcing Learning Application
        - FRS — Flight Reservation System (FRS)
        - GHBL — Ghibli Encyclopedia
        - PWRH — Project Powerhouse
        - VGFN — Veg Finder
      default: 0
    validations:
      required: true
  - type: dropdown
    id: course
    attributes:
      label: Course
      description: Course this submission is for.
      options:
        - ATDD Accelerator
      default: 0
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Select the module you are submitting for review.
      options:
        - "— Select a module —"
        - 01 - Getting Started
        - 02 - Smoke Tests
        - 03 - E2E Tests
        - 04 - Architecture - Clients
        - 05 - Architecture - Drivers
        - 06 - Architecture - Channels
        - 07 - Architecture - Use Case DSL
        - 08 - Architecture - Scenario DSL
        - 09 - Architecture - External Stubs
        - 10 - Acceptance Tests
        - 11 - Contract Tests
        - 12 - ATDD - Acceptance Criteria
        - 13 - ATDD - Acceptance Tests
        - 14 - ATDD - Contract Tests
        - 15 - Structural Changes
      default: 0
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ## Review Checklist
        *This section will be auto-generated after submission.*
